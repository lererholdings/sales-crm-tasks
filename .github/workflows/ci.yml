name: CI

on:
  push:
    paths-ignore:
      - '**.md'
      - 'docs/mockups/**'
  pull_request:
    branches: [main]
    paths-ignore:
      - '**.md'
      - 'docs/mockups/**'

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Install root dependencies
        run: npm install

      - name: Run api/ tests
        run: npm test -- --reporter=default --reporter=json --outputFile=unit-results.json

      - name: Run integration tests (real dev DB, test auth bypass)
        run: npm run test:integration -- --reporter=default --reporter=json --outputFile=integration-results.json
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          TEST_AUTH_BYPASS_SECRET: ${{ secrets.TEST_AUTH_BYPASS_SECRET }}

      - name: Install frontend dependencies
        run: npm --prefix frontend install

      - name: Run frontend tests
        run: npm --prefix frontend run test -- --reporter=default --reporter=json --outputFile=frontend-results.json

      - name: Build frontend
        run: npm --prefix frontend run build

      # Renders a markdown table at the top of the run page so pass/fail is
      # visible at a glance — useful for milestones with no UI to eyeball in
      # a browser. Runs even if an earlier step failed, so you still get a
      # readable picture of how far the run got.
      - name: Write test summary
        if: always()
        run: |
          echo "## Test summary" >> "$GITHUB_STEP_SUMMARY"
          echo "| Suite | Result |" >> "$GITHUB_STEP_SUMMARY"
          echo "|---|---|" >> "$GITHUB_STEP_SUMMARY"
          node scripts/ci-test-summary.mjs "Unit tests (api/, lib/)" unit-results.json >> "$GITHUB_STEP_SUMMARY"
          node scripts/ci-test-summary.mjs "Integration tests (real dev DB)" integration-results.json >> "$GITHUB_STEP_SUMMARY"
          node scripts/ci-test-summary.mjs "Frontend tests" frontend/frontend-results.json >> "$GITHUB_STEP_SUMMARY"

  verify-preview-deployment:
    name: Verify live preview deployment
    needs: build-and-test
    runs-on: ubuntu-latest
    if: github.ref != 'refs/heads/main'
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Install root dependencies
        run: npm install

      # Resolved via the GitHub Deployments API rather than constructed from
      # the branch name — Vercel truncates + appends a short hash to the
      # generated alias once <project>-git-<branch>-<scope> would exceed the
      # 63-char DNS label limit (hit for the first time by
      # milestone-6-filters-sorting-columns), so string-guessing the URL is
      # not reliable for longer branch names.
      #
      # Walks backward through this branch's commit history (not just the
      # exact head SHA) looking for a commit Vercel actually built a
      # deployment for — found via a real PR whose last commit only touched
      # docs/operations.md: Vercel's Ignored Build Step correctly skips
      # building a docs-only commit, so no deployment record exists for
      # that exact SHA, and a SHA-only lookup polls for the full 5 minutes
      # and fails every time. The branch's live alias still points at the
      # last commit Vercel *did* build, so that's what this should resolve
      # to. (GitHub's deployment records have no queryable branch field —
      # `ref` is always just the SHA — so this can't be done as a single
      # API filter.) fetch-depth: 0 above so the walk has real history to
      # search, not just the single checked-out commit.
      - name: Wait for the preview deployment to be live
        id: preview
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          SHA="${{ github.event.pull_request.head.sha || github.sha }}"
          echo "Looking up the Preview deployment for $SHA (or the most recent earlier commit Vercel actually built)"
          for i in $(seq 1 30); do
            DEPLOYMENT_ID=""
            for CANDIDATE_SHA in $(git log --format=%H "$SHA" -n 20); do
              ID=$(gh api "repos/${{ github.repository }}/deployments?sha=$CANDIDATE_SHA&environment=Preview" --jq '.[0].id // empty')
              if [ -n "$ID" ]; then
                DEPLOYMENT_ID="$ID"
                break
              fi
            done
            if [ -n "$DEPLOYMENT_ID" ]; then
              URL=$(gh api "repos/${{ github.repository }}/deployments/$DEPLOYMENT_ID/statuses" --jq '[.[] | select(.state == "success")][0].environment_url // empty')
              if [ -n "$URL" ]; then
                CODE=$(curl -s -o /dev/null -w "%{http_code}" -H "x-vercel-protection-bypass: ${{ secrets.VERCEL_PROTECTION_BYPASS_SECRET }}" "$URL/api/health")
                if [ "$CODE" = "200" ]; then
                  echo "url=$URL" >> "$GITHUB_OUTPUT"
                  exit 0
                fi
              fi
            fi
            sleep 10
          done
          echo "Timed out waiting for the preview deployment to respond"
          exit 1

      # Real HTTP against the actually-deployed function — catches things
      # the in-process integration tests can't (env var scoping, routing,
      # vercel.json misconfig, cold-start issues). Uses the SAME test auth
      # bypass, so TEST_AUTH_BYPASS_SECRET must also be set in Vercel's
      # Preview environment (never Production) for this to pass.
      - name: Smoke test the live preview — static route (GET /api/users)
        id: static_smoke_test
        env:
          PREVIEW_URL: ${{ steps.preview.outputs.url }}
          VERCEL_PROTECTION_BYPASS_SECRET: ${{ secrets.VERCEL_PROTECTION_BYPASS_SECRET }}
          TEST_AUTH_BYPASS_SECRET: ${{ secrets.TEST_AUTH_BYPASS_SECRET }}
        run: |
          set -e
          TEST_ID="test_ci_preview_${{ github.run_id }}"

          CODE=$(curl -s -o /tmp/users.json -w "%{http_code}" \
            -H "x-vercel-protection-bypass: $VERCEL_PROTECTION_BYPASS_SECRET" \
            -H "x-test-bypass-secret: $TEST_AUTH_BYPASS_SECRET" \
            -H "x-test-clerk-user-id: $TEST_ID" \
            -H "x-test-email: ${TEST_ID}@test.invalid" \
            "$PREVIEW_URL/api/users")
          echo "GET /api/users -> $CODE"
          cat /tmp/users.json
          [ "$CODE" = "200" ]
          grep -q "${TEST_ID}@test.invalid" /tmp/users.json

      # Dynamic bracket routes ([id].js) are a distinct code path from static
      # ones in Vercel's routing — a broad SPA catch-all rewrite silently
      # swallowed them once already (see design.md section 12, "SPA rewrite
      # must exclude /api/*"), and that class of bug can only be caught by
      # real HTTP against a live deployment, never by mocked/in-process
      # tests. Keep this dynamic-route check here so it can't regress
      # unnoticed again.
      - name: Smoke test the live preview — dynamic route (GET/PATCH /api/accounts/:id)
        env:
          PREVIEW_URL: ${{ steps.preview.outputs.url }}
          VERCEL_PROTECTION_BYPASS_SECRET: ${{ secrets.VERCEL_PROTECTION_BYPASS_SECRET }}
          TEST_AUTH_BYPASS_SECRET: ${{ secrets.TEST_AUTH_BYPASS_SECRET }}
        run: |
          set -e
          TEST_ID="test_ci_preview_${{ github.run_id }}"

          CREATE_CODE=$(curl -s -o /tmp/account_create.json -w "%{http_code}" \
            -H "x-vercel-protection-bypass: $VERCEL_PROTECTION_BYPASS_SECRET" \
            -H "x-test-bypass-secret: $TEST_AUTH_BYPASS_SECRET" \
            -H "x-test-clerk-user-id: $TEST_ID" \
            -H "Content-Type: application/json" \
            -X POST -d '{"name":"CI Preview Smoke Test Account","country":"Australia","acv":1000}' \
            "$PREVIEW_URL/api/accounts")
          echo "POST /api/accounts -> $CREATE_CODE"
          cat /tmp/account_create.json
          [ "$CREATE_CODE" = "201" ]
          ACCOUNT_ID=$(node -e "console.log(JSON.parse(require('fs').readFileSync('/tmp/account_create.json','utf8')).id)")
          echo "account_id=$ACCOUNT_ID" >> "$GITHUB_OUTPUT"

          GET_CODE=$(curl -s -o /tmp/account_get.json -w "%{http_code}" \
            -H "x-vercel-protection-bypass: $VERCEL_PROTECTION_BYPASS_SECRET" \
            -H "x-test-bypass-secret: $TEST_AUTH_BYPASS_SECRET" \
            -H "x-test-clerk-user-id: $TEST_ID" \
            "$PREVIEW_URL/api/accounts/$ACCOUNT_ID")
          echo "GET /api/accounts/:id -> $GET_CODE"
          cat /tmp/account_get.json
          [ "$GET_CODE" = "200" ]
          grep -q '"acv":1000' /tmp/account_get.json

          PATCH_CODE=$(curl -s -o /tmp/account_patch.json -w "%{http_code}" \
            -H "x-vercel-protection-bypass: $VERCEL_PROTECTION_BYPASS_SECRET" \
            -H "x-test-bypass-secret: $TEST_AUTH_BYPASS_SECRET" \
            -H "x-test-clerk-user-id: $TEST_ID" \
            -H "Content-Type: application/json" \
            -X PATCH -d '{"acv":2000}' \
            "$PREVIEW_URL/api/accounts/$ACCOUNT_ID")
          echo "PATCH /api/accounts/:id -> $PATCH_CODE"
          cat /tmp/account_patch.json
          [ "$PATCH_CODE" = "200" ]
          grep -q '"acv":2000' /tmp/account_patch.json
        id: accounts_smoke_test

      - name: Clean up test data created against the preview deployment
        if: always()
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          ACCOUNT_ID: ${{ steps.accounts_smoke_test.outputs.account_id }}
        run: |
          node -e "
          import('./lib/db.js').then(async ({ query }) => {
            const accountId = process.env.ACCOUNT_ID;
            if (accountId) {
              await query('DELETE FROM audit_log WHERE entity_id = \$1', [accountId]);
              await query('DELETE FROM accounts WHERE id = \$1', [accountId]);
            }
            await query(\"DELETE FROM users WHERE clerk_user_id LIKE 'test_ci_preview_%'\");
            process.exit(0);
          }).catch((e) => { console.error(e); process.exit(1); });
          "

      - name: Write live-preview smoke test summary
        if: always()
        run: |
          echo "## Live preview smoke tests" >> "$GITHUB_STEP_SUMMARY"
          echo "| Check | Result |" >> "$GITHUB_STEP_SUMMARY"
          echo "|---|---|" >> "$GITHUB_STEP_SUMMARY"
          echo "| Preview deployment reachable | ${{ steps.preview.outcome == 'success' && '✅ passed' || steps.preview.outcome == 'skipped' && '⚠️ skipped' || '❌ failed' }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Static route (GET /api/users) | ${{ steps.static_smoke_test.outcome == 'success' && '✅ passed' || steps.static_smoke_test.outcome == 'skipped' && '⚠️ skipped' || '❌ failed' }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Dynamic route (POST/GET/PATCH /api/accounts/:id) | ${{ steps.accounts_smoke_test.outcome == 'success' && '✅ passed' || steps.accounts_smoke_test.outcome == 'skipped' && '⚠️ skipped' || '❌ failed' }} |" >> "$GITHUB_STEP_SUMMARY"
